<!DOCTYPE html>
<html style="height:100%; margin:0;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
</head>
<body style="height:100%; margin:0; overflow:hidden; background-color:#000;">
    <a href="#" id="Zhicheng" style="display:block; width:100vw; height:100vh; text-decoration:none;">
        <img src="Gemini_Generated_Image_7t8ceh7t8ceh7t8c.png" 
             style="width:100%; height:100%; object-fit:contain; border:none;" 
             alt="Click to Play">
    </a>

    <script>
        // 1. 获取网址参数 ?id=x
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id') || "4"; // 如果没传参数，默认用你代码里的 4

        // 2. 这里的链接前缀保持和你提供的一致
        const baseLink = "https://streamtape.com/v/qjmBqDAkdGfRyj/";
        
        // 3. 动态修改那个名为 "Zhicheng" 的钩子链接
        document.getElementById('Zhicheng').href = baseLink + id + ".mp4";
    </script>
</body>
</html>
